<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire avec tracking discret</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }

        h3 {
            margin: 30px 0 15px 0;
            color: #555;
            border-top: 1px solid #ddd;
            padding-top: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #5a67d8;
        }

        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
        }

        .loading.active {
            display: block;
        }

        .lien {
            display: inline-block;
            margin: 10px 15px 10px 0;
            padding: 10px 15px;
            background: #f0f0f0;
            border-radius: 5px;
            text-decoration: none;
            color: #667eea;
            font-weight: bold;
            transition: all 0.3s;
            cursor: pointer;
        }

        .lien:hover {
            background: #667eea;
            color: white;
        }

        .liste-liens {
            margin: 20px 0;
        }

        .galerie {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin: 20px 0;
        }

        .image-card {
            text-align: center;
            transition: transform 0.3s;
            cursor: pointer;
        }

        .image-card:hover {
            transform: scale(1.05);
        }

        .image-card img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            border: 3px solid #ddd;
            transition: all 0.3s;
        }

        .image-card img:hover {
            border-color: #667eea;
        }

        .image-card p {
            margin-top: 8px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Formulaire d'enregistrement</h1>
        
        <form id="monFormulaire">
            <div class="form-group">
                <label for="name">Nom complet *</label>
                <input type="text" id="name" name="name" required placeholder="Entrez votre nom complet">
            </div>

            <div class="form-group">
                <label for="country">Pays *</label>
                <select id="country" name="country" required>
                    <option value="">Sélectionnez votre pays</option>
                    <option value="France">France</option>
                    <option value="Belgique">Belgique</option>
                    <option value="Suisse">Suisse</option>
                    <option value="Canada">Canada</option>
                    <option value="Autre">Autre</option>
                </select>
            </div>

            <button type="submit">📨 Envoyer</button>
        </form>

        <div id="loading" class="loading">Envoi en cours...</div>
        <div id="message" class="message"></div>

        <h3>🖼️ Nos destinations</h3>
        <div class="galerie" id="galerieImages">
            <div class="image-card" data-image="Capteur de rêves" data-nom="🏔️ Capteur de rêves">
                <img src="https://picsum.photos/id/104/150/150" alt="Capteur de rêves">
                <p>Capteur de rêves</p>
            </div>
            <div class="image-card" data-image="Chute" data-nom="🏖️ Chute">
                <img src="https://picsum.photos/id/15/150/150" alt="Chute">
                <p>Chute</p>
            </div>
            <div class="image-card" data-image="Manette" data-nom="🌳 Manette">
                <img src="https://picsum.photos/id/96/150/150" alt="Manette">
                <p>Manette</p>
            </div>
            <div class="image-card" data-image="Ordi" data-nom="🌃 Ordi">
                <img src="https://picsum.photos/id/0/150/150" alt="Ordi">
                <p>Ordi</p>
            </div>
            <div class="image-card" data-image="Plaine" data-nom="🏜️ Plaine">
                <img src="https://picsum.photos/id/116/150/150" alt="Plaine">
                <p>Plaine</p>
            </div>
        </div>

        <h3>🔗 Liens utiles</h3>
        <div class="liste-liens">
            <a href="#" class="lien" data-evenement="telechargement_pdf">📄 Télécharger le PDF</a>
            <a href="#" class="lien" data-evenement="page_contact">📞 Contact</a>
            <a href="#" class="lien" data-evenement="newsletter">✉️ Newsletter</a>
            <a href="#" class="lien" data-evenement="partage_facebook">👍 Facebook</a>
            <a href="#" class="lien" data-evenement="site_partenaires">🔗 Partenaires</a>
        </div>
    </div>

    <script>
        // ⚠️ REMPLACEZ CETTE URL PAR LA VÔTRE ⚠️
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyzp3ODctfNbJe9W6FYaUnP22lidXItSTUGE8X5GzxioYh-fdPDx4QTop5C7MNAFxS-ug/exec';
        
        // Informations techniques du visiteur (valables pour toute la session)
        const infosTechniques = {
            page: window.location.pathname,
            referrer: document.referrer || 'Direct',
            ecran: `${screen.width}x${screen.height}`,
            langue: navigator.language || navigator.userLanguage,
            navigateur: navigator.userAgent.substring(0, 150)
        };
        
        // ============================================
        // Fonction unique pour envoyer les données
        // ============================================
        async function envoyerDonnees(donnees) {
            // Ajouter automatiquement les infos techniques à chaque envoi
            donnees.append('page', infosTechniques.page);
            donnees.append('referrer', infosTechniques.referrer);
            donnees.append('ecran', infosTechniques.ecran);
            donnees.append('langue', infosTechniques.langue);
            donnees.append('navigateur', infosTechniques.navigateur);
            
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: donnees
                });
                console.log('Données envoyées');
            } catch (error) {
                console.error('Erreur:', error);
            }
        }
        
        // ============================================
        // TRACKING PAGE VISITE
        // ============================================
        const formDataVisite = new FormData();
        formDataVisite.append('type', 'visite');
        formDataVisite.append('evenement', 'page_ouverte');
        envoyerDonnees(formDataVisite);
        
        // ============================================
        // FORMULAIRE
        // ============================================
        const form = document.getElementById('monFormulaire');
        const loading = document.getElementById('loading');
        const messageDiv = document.getElementById('message');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const country = document.getElementById('country').value;
            
            if (!name || !country) {
                showMessage('Veuillez remplir tous les champs', 'error');
                return;
            }
            
            loading.classList.add('active');
            messageDiv.className = 'message';
            messageDiv.style.display = 'none';
            
            const formData = new FormData();
            formData.append('type', 'formulaire');
            formData.append('name', name);
            formData.append('country', country);
            formData.append('evenement', 'soumission_formulaire');
            
            await envoyerDonnees(formData);
            
            showMessage('✅ Formulaire envoyé !', 'success');
            form.reset();
            loading.classList.remove('active');
        });
        
        // ============================================
        // TRACKING CLIENS SUR LIENS
        // ============================================
        document.querySelectorAll('.lien').forEach(lien => {
            lien.addEventListener('click', async (e) => {
                e.preventDefault();
                
                const evenement = lien.getAttribute('data-evenement');
                const name = document.getElementById('name').value.trim() || '';
                const country = document.getElementById('country').value || '';
                
                const formData = new FormData();
                formData.append('type', 'clic');
                formData.append('evenement', evenement);
                formData.append('name', name);
                formData.append('country', country);
                
                await envoyerDonnees(formData);
                console.log('Clic enregistré:', evenement);
            });
        });
        
        // ============================================
        // TRACKING SURVOL IMAGES
        // ============================================
        document.querySelectorAll('.image-card').forEach(imageCard => {
            const imageId = imageCard.getAttribute('data-image');
            const imageNom = imageCard.getAttribute('data-nom');
            let dernierEnvoi = 0;
            
            imageCard.addEventListener('mouseenter', async () => {
                const maintenant = Date.now();
                if (maintenant - dernierEnvoi < 3000) return;
                dernierEnvoi = maintenant;
                
                const name = document.getElementById('name').value.trim() || '';
                const country = document.getElementById('country').value || '';
                
                const formData = new FormData();
                formData.append('type', 'survol');
                formData.append('evenement', 'survol_image');
                formData.append('image_id', imageId);
                formData.append('image_nom', imageNom);
                formData.append('name', name);
                formData.append('country', country);
                
                await envoyerDonnees(formData);
                console.log('Survol enregistré:', imageNom);
            });
        });
        
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
