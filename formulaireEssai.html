<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire - Nom et Pays</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        select {
            cursor: pointer;
            background-color: white;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Formulaire d'enregistrement</h1>
        <div class="subtitle">Veuillez remplir vos informations</div>

        <!-- Le formulaire - action à remplacer avec votre URL Google Apps Script -->
        <form id="contactForm">
            <div class="form-group">
                <label for="name">Nom complet *</label>
                <input type="text" id="name" name="name" required placeholder="Entrez votre nom complet">
            </div>

            <div class="form-group">
                <label for="country">Pays *</label>
                <select id="country" name="country" required>
                    <option value="">Sélectionnez votre pays</option>
                    <option value="France">🇫🇷 France</option>
                    <option value="Belgique">🇧🇪 Belgique</option>
                    <option value="Suisse">🇨🇭 Suisse</option>
                    <option value="Canada">🇨🇦 Canada</option>
                    <option value="Luxembourg">🇱🇺 Luxembourg</option>
                    <option value="Algérie">🇩🇿 Algérie</option>
                    <option value="Maroc">🇲🇦 Maroc</option>
                    <option value="Tunisie">🇹🇳 Tunisie</option>
                    <option value="Sénégal">🇸🇳 Sénégal</option>
                    <option value="Côte d'Ivoire">🇨🇮 Côte d'Ivoire</option>
                    <option value="Cameroun">🇨🇲 Cameroun</option>
                    <option value="Madagascar">🇲🇬 Madagascar</option>
                    <option value="RDC">🇨🇩 RD Congo</option>
                    <option value="Autre">🌍 Autre pays</option>
                </select>
            </div>

            <button type="submit">📨 Envoyer</button>
        </form>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px;">Envoi en cours...</p>
        </div>

        <div id="message" class="message"></div>
    </div>

    <script>
        // ⚠️ IMPORTANT: Remplacez cette URL par la vôtre après avoir déployé le script Google Apps Script
        // Pour obtenir votre URL: Suivez les instructions dans la section "Configuration Google Sheets"
        const GOOGLE_SCRIPT_URL ='https://script.google.com/macros/s/AKfycbzmYh9NoR7l8MkDYpkRCpZuyQOFXlnxZ5cCCjgt3fctQt18QYad8kbOAl6ELg3Pk1mXlA/exec';

        const form = document.getElementById('contactForm');
        const loading = document.getElementById('loading');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Récupérer les valeurs
            const name = document.getElementById('name').value.trim();
            const country = document.getElementById('country').value;
            
            // Validation simple
            if (!name || !country) {
                showMessage('Veuillez remplir tous les champs', 'error');
                return;
            }
            
            // Afficher le loading
            loading.classList.add('active');
            messageDiv.className = 'message';
            messageDiv.style.display = 'none';
            
            // Préparer les données
            const formData = new FormData();
            formData.append('name', name);
            formData.append('country', country);
            
            try {
                // Envoyer les données à Google Sheets
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Nécessaire pour Google Apps Script
                    body: formData
                });
                
                // Avec mode: 'no-cors', on ne peut pas lire la réponse
                // On considère que c'est un succès
                showMessage('✅ Données envoyées avec succès ! Merci.', 'success');
                form.reset();
                
            } catch (error) {
                console.error('Erreur:', error);
                showMessage('❌ Une erreur est survenue. Veuillez réessayer.', 'error');
            } finally {
                loading.classList.remove('active');
            }
        });
        
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            // Masquer le message après 5 secondes
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
