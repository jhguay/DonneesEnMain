<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Station Météo ESP32</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #f5f7fa;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #1a237e;
            text-align: center;
        }
        iframe {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 10px;
            background: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Station Météo ESP32</h1>
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQK890ojbm8-ai0hhWO-Xehbr_2wFX7JTo8FMK875jmigLH0jeklRRJqQCUSMOxPyEa-awINW2AYDiY/pubhtml"></iframe>
        <p style="text-align: center; color: #78909c; margin-top: 15px;">
            Dernière mise à jour : <span id="updateTime"></span>
        </p>
    </div>
    <script>
        document.getElementById('updateTime').textContent = new Date().toLocaleString('fr-FR');
    </script>
</body>
</html>
