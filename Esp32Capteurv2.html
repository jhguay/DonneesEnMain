<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Station Météo ESP32</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f4f8; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; padding: 20px; background: white; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        header h1 { color: #1a237e; font-size: 2.5rem; }
        header .subtitle { color: #546e7a; font-size: 1.1rem; }
        .last-update { color: #78909c; font-size: 0.9rem; margin-top: 10px; }
        .status-led { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }
        .status-led.online { background: #4caf50; }
        .status-led.offline { background: #f44336; }
        
        .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: white; border-radius: 15px; padding: 30px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .card-icon { font-size: 3rem; }
        .card h3 { color: #78909c; text-transform: uppercase; font-size: 0.9rem; margin: 5px 0 10px 0; }
        .card .valeur { font-size: 3rem; font-weight: 700; }
        .card .unite { color: #78909c; font-size: 1rem; }
        .card.temp .valeur { color: #e53935; }
        .card.humidite .valeur { color: #1e88e5; }
        .card.sol .valeur { color: #43a047; }
        
        .table-container { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .table-container h2 { color: #1a237e; margin-bottom: 20px; }
        .table-wrapper { overflow-x: auto; max-height: 500px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        thead { background: #1a237e; color: white; position: sticky; top: 0; z-index: 10; }
        th { padding: 12px 15px; text-align: left; }
        td { padding: 10px 15px; border-bottom: 1px solid #e8eaf6; }
        tbody tr:nth-child(even) { background: #fafbff; }
        tbody tr:hover { background: #f5f7fa; }
        
        .refresh { text-align: center; margin-top: 30px; }
        .refresh button { background: #1a237e; color: white; border: none; padding: 12px 40px; border-radius: 30px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: transform 0.3s ease; box-shadow: 0 4px 15px rgba(26,35,126,0.3); }
        .refresh button:hover { transform: scale(1.05); }
        .refresh button:disabled { opacity: 0.6; cursor: not-allowed; }
        footer { text-align: center; margin-top: 30px; color: #78909c; font-size: 0.85rem; }
        
        @media (max-width: 768px) {
            .cards { grid-template-columns: 1fr; }
            .card .valeur { font-size: 2rem; }
            header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Station Météo ESP32</h1>
            <p class="subtitle">DHT22 + Capteur d'humidité du sol</p>
            <div class="last-update">
                <span class="status-led" id="statusLed"></span>
                <span id="updateTime">Chargement...</span>
            </div>
        </header>
        
        <div class="cards">
            <div class="card temp">
                <div class="card-icon">🌡️</div>
                <h3>Température</h3>
                <div class="valeur" id="temp">--</div>
                <div class="unite">°C</div>
            </div>
            <div class="card humidite">
                <div class="card-icon">💨</div>
                <h3>Humidité Air</h3>
                <div class="valeur" id="hum">--</div>
                <div class="unite">%</div>
            </div>
            <div class="card sol">
                <div class="card-icon">🌱</div>
                <h3>Humidité Sol</h3>
                <div class="valeur" id="sol">--</div>
                <div class="unite">%</div>
            </div>
        </div>
        
        <div class="table-container">
            <h2>📋 Historique</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Date/Heure</th>
                            <th>🌡️ Température</th>
                            <th>💨 Humidité Air</th>
                            <th>🌱 Humidité Sol</th>
                            <th>📶 Signal</th>
                            <th>🔢 #</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="6" style="text-align:center;color:#999;">Chargement...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="refresh">
            <button onclick="chargerDonnees()" id="btnRefresh">🔄 Actualiser</button>
        </div>
        
        <footer>ESP32 - Mise à jour toutes les 10 minutes</footer>
    </div>

    <script>
        // ============================================
        // 1. PUBLIEZ VOTRE GOOGLE SHEETS EN CSV
        //    Fichier → Partager → Publier sur le Web
        //    Format: CSV
        //    Copiez l'URL ci-dessous
        // ============================================
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQK890ojbm8-ai0hhWO-Xehbr_2wFX7JTo8FMK875jmigLH0jeklRRJqQCUSMOxPyEa-awINW2AYDiY/pub?output=csv';

        async function chargerDonnees() {
            const btn = document.getElementById('btnRefresh');
            btn.disabled = true;
            btn.textContent = '⏳...';

            try {
                const response = await fetch(CSV_URL + '&t=' + Date.now());
                const csv = await response.text();
                
                // Parser le CSV
                const lignes = csv.split('\n').filter(l => l.trim() !== '');
                if (lignes.length < 2) throw new Error('Pas de données');
                
                // Lire les données (sauter l'en-tête)
                const donnees = [];
                for (let i = 1; i < lignes.length; i++) {
                    const cols = lignes[i].split(',').map(c => c.trim());
                    if (cols.length >= 4) {
                        const temp = parseFloat(cols[1].replace(',', '.')) || 0;
                        const hum = parseFloat(cols[2].replace(',', '.')) || 0;
                        const sol = parseFloat(cols[3].replace(',', '.')) || 0;
                        
                        // Garder uniquement les valeurs valides (temp > 0)
                        if (temp > 0 && hum > 0) {
                            donnees.push({
                                date: cols[0],
                                temperature: temp,
                                airHumidite: hum,
                                solHumidite: sol,
                                signal: parseInt(cols[4]) || 0,
                                compteur: parseInt(cols[5]) || 0
                            });
                        }
                    }
                }
                
                if (donnees.length === 0) {
                    document.getElementById('tableBody').innerHTML = 
                        '<tr><td colspan="6" style="text-align:center;color:#999;">Aucune donnée</td></tr>';
                    document.getElementById('statusLed').className = 'status-led offline';
                    return;
                }
                
                // Dernière valeur
                const d = donnees[donnees.length - 1];
                document.getElementById('temp').textContent = d.temperature.toFixed(1);
                document.getElementById('hum').textContent = d.airHumidite.toFixed(1);
                document.getElementById('sol').textContent = d.solHumidite.toFixed(1);
                
                // Tableau (20 dernières lignes inversées)
                const dernieres = donnees.slice(-20).reverse();
                document.getElementById('tableBody').innerHTML = dernieres.map(row => `
                    <tr>
                        <td>${row.date}</td>
                        <td>${row.temperature.toFixed(1)} °C</td>
                        <td>${row.airHumidite.toFixed(1)} %</td>
                        <td>${row.solHumidite.toFixed(1)} %</td>
                        <td>${row.signal} dBm</td>
                        <td>${row.compteur}</td>
                    </tr>
                `).join('');
                
                document.getElementById('updateTime').textContent = 
                    'Dernière mise à jour : ' + new Date().toLocaleString('fr-FR');
                document.getElementById('statusLed').className = 'status-led online';
                
            } catch (err) {
                console.error(err);
                document.getElementById('tableBody').innerHTML = 
                    `<tr><td colspan="6" style="text-align:center;color:#e53935;">❌ ${err.message}</td></tr>`;
                document.getElementById('statusLed').className = 'status-led offline';
            }
            
            btn.disabled = false;
            btn.textContent = '🔄 Actualiser';
        }

        document.addEventListener('DOMContentLoaded', () => {
            chargerDonnees();
            setInterval(chargerDonnees, 30000);
        });
    </script>
</body>
</html>
